server:
  port: 8087
  
spring:
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: authuser
  datasource:
    url: jdbc:postgresql://localhost:5432/eadhub-authuser
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

course:
  service:
    url: http://localhost:8082