services:
  eadhub-db:
    image: postgres:15
    container_name: eadhub-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - eadhub-db-data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  consul:
    image: hashicorp/consul:1.19
    container_name: eadhub-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0

volumes:
  eadhub-db-data:
