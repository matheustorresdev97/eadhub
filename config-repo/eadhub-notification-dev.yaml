server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eadhub-notification
    username: postgres
    password: postgres
  cloud:
    consul:
      discovery:
        service-name: eadhub-notification

eadhub:
  broker:
    exchange:
      userEvent: eadhub.userevent
    queue:
      notificationCommand: eadhub.notificationcommand
