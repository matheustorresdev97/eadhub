server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eadhub-authuser
    username: postgres
    password: postgres
  cloud:
    consul:
      discovery:
        service-name: eadhub-authuser
    openfeign:
      circuitbreaker:
        enabled: true

eadhub:
  broker:
    exchange:
      userEvent: eadhub.userevent
  auth:
    jwtSecret: dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1qd3QtYXV0aGVudGljYXRpb24taW4tZWFkaHViLXByb2plY3Q=
    jwtExpirationMs: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health, refresh # Sobrescreve o global para incluir o refresh

authuser:
  refreshscope:
    name: "Matheus Torres - Valor Inicial"

resilience4j:
  circuitbreaker:
    instances:
      circuitBreakerInstance:
        slidingWindowSize: 30
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 2
        waitDurationInOpenState: 30s
        failureRateThreshold: 80
        eventConsumerBufferSize: 10
